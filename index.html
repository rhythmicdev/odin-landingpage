<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="section-header">
        <div class="header-logo"></div>
        <div class="header-links"></div>
    </div>

    <div class="section-hero">
        <div class="hero-panel">
            <div class="hero-text"></div>
            <div class="hero-subtext"></div>
            <div class="hero-signup"></div>
        </div>
        <div class="hero-image"></div>
    </div>

    <div class="section-information">
        <div class="info-title"></div>
        <div class="info-cardcontainer">
            <div class="info-card">
                <div class="card-illustration"></div>
                <div class="card-subtext"></div>
            </div>
            <div class="info-card">
                <div class="card-illustration"></div>
                <div class="card-subtext"></div>
            </div>
            <div class="info-card">
                <div class="card-illustration"></div>
                <div class="card-subtext"></div>
            </div>
            <div class="info-card">
                <div class="card-illustration"></div>
                <div class="card-subtext"></div>
            </div>
        </div>
    </div>

    <div class="section-testimonial">
        <div class="testimonial">
            <div class="testimonial-quote"></div>
            <div class="testimonial-source"></div>
        </div>
    </div>

    <div class="section-signup">
        <div class="signup-panel">
            <div class="signup-text">
                <div class="signup-title"></div>
                <div class="signup-subtext"></div>
            </div>
            <div class="signup-button"></div>
        </div>
    </div>

    <div class="section-footer">
        <div class="footer-text"></div>
    </div>

</body>
</html>
